version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    groups:
      website-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
